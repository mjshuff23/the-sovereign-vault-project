services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200'"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"
      - "14250:14250"

  sanitizer:
    build:
      context: ./sanitizer
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      RUST_LOG: info
    depends_on:
      - otel-collector

  vault:
    build:
      context: ./vault
    environment:
      ATTESTATION_SECRET: local-dev-attestation-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - otel-collector

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      PORT: 4000
      REDIS_URL: redis://redis:6379
      SANITIZER_URL: http://sanitizer:8080
      VAULT_URL: http://vault:8000
      QDRANT_URL: http://qdrant:6333
      ATTESTATION_SECRET: local-dev-attestation-secret
      ATTESTATION_DOC_PATH: /app/scripts/attestation/enclave-attestation.json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "4000:4000"
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      sanitizer:
        condition: service_healthy
      vault:
        condition: service_healthy
      otel-collector:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      # These are browser-consumed URLs. `worker:4000` is only resolvable inside
      # the Compose network, while the user's browser reaches the exposed port.
      NEXT_PUBLIC_WORKER_HTTP_URL: ${NEXT_PUBLIC_WORKER_HTTP_URL:-http://localhost:4000}
      NEXT_PUBLIC_WORKER_WS_URL: ${NEXT_PUBLIC_WORKER_WS_URL:-ws://localhost:4000/ws}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      worker:
        condition: service_healthy

volumes:
  redis-data:
  qdrant-data:
